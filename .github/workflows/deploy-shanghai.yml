name: Deploy Shanghai Sub2API

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag or full image ref to deploy"
        required: false
        default: latest

permissions:
  contents: read
  packages: read

concurrency:
  group: shanghai-sub2api-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/xuehua123/sub2api

jobs:
  deploy:
    if: github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Shanghai
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          RESIN_PROXY_URL: ${{ secrets.RESIN_PROXY_URL }}
          DOCKER_NO_PROXY: ${{ secrets.DOCKER_NO_PROXY || '127.0.0.1,localhost,postgres,redis' }}
        with:
          host: ${{ secrets.SH_PROD_HOST || '119.45.125.174' }}
          username: ${{ secrets.SH_PROD_USER || 'ubuntu' }}
          key: ${{ secrets.SHANGHAI_DEPLOY_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SH_PROD_PASSWORD }}
          port: ${{ secrets.SH_PROD_PORT || '22' }}
          envs: IMAGE_NAME,DEPLOY_IMAGE_TAG,GHCR_TOKEN,GHCR_USERNAME,RESIN_PROXY_URL,DOCKER_NO_PROXY
          script_stop: true
          command_timeout: 10m
          script: |
            set -eu
            cd /srv/sub2api

            if echo "$DEPLOY_IMAGE_TAG" | grep -Eq '^[^/]+/[^:]+/.+[:@]'; then
              deploy_image="$DEPLOY_IMAGE_TAG"
              safe_tag="$(echo "$DEPLOY_IMAGE_TAG" | tr '/:@' '---')"
            else
              deploy_image="${IMAGE_NAME}:${DEPLOY_IMAGE_TAG}"
              safe_tag="$DEPLOY_IMAGE_TAG"
            fi
            backup="compose.yml.bak-$(date +%Y%m%d-%H%M%S)-pre-${safe_tag}"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USERNAME:-x-access-token}" --password-stdin
            fi

            if [ -n "${RESIN_PROXY_URL:-}" ]; then
              export HTTP_PROXY="$RESIN_PROXY_URL"
              export HTTPS_PROXY="$RESIN_PROXY_URL"
              export http_proxy="$RESIN_PROXY_URL"
              export https_proxy="$RESIN_PROXY_URL"
              export NO_PROXY="$DOCKER_NO_PROXY"
              export no_proxy="$DOCKER_NO_PROXY"
            fi

            cp compose.yml "$backup"
            DEPLOY_IMAGE="$deploy_image" python3 - <<'PY'
from pathlib import Path
import os

path = Path("compose.yml")
deploy_image = os.environ["DEPLOY_IMAGE"]
lines = path.read_text().splitlines()

for index, line in enumerate(lines):
    stripped = line.lstrip()
    if stripped.startswith("image: ghcr.io/xuehua123/sub2api"):
        indent = line[: len(line) - len(stripped)]
        lines[index] = f"{indent}image: {deploy_image}"
        break
else:
    raise SystemExit("compose image line not found")

path.write_text("\n".join(lines) + "\n")
PY

            chmod +x ./update.sh
            ./update.sh

            docker compose ps
            docker image prune -f
