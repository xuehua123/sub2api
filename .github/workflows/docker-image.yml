name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: sub2api-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/xuehua123/sub2api

jobs:
  docker:
    if: github.ref_type == 'tag' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=false

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-shanghai:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch
    steps:
      - name: Deploy to Shanghai
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 101.35.240.224
          username: root
          password: ${{ secrets.SH_PROD_PASSWORD }}
          port: ${{ secrets.SH_PROD_PORT || '22' }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            cd /opt/platform

            export COMPOSE_PROJECT_NAME=platform
            export DOCKER_CONFIG=/tmp/docker-public
            mkdir -p "$DOCKER_CONFIG"
            rm -f "$DOCKER_CONFIG/config.json"

            docker compose pull sub2api
            docker compose up -d sub2api
            docker image prune -f

            sleep 10
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:18080/health > /dev/null 2>&1; then
                echo "sub2api is healthy"
                docker compose ps sub2api
                exit 0
              fi
              sleep 3
            done

            echo "sub2api health check failed"
            docker compose ps sub2api
            docker compose logs sub2api --tail 50 || true
            exit 1
