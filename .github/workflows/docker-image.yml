name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: sub2api-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/xuehua123/sub2api
  GATEWAY_IMAGE_NAME: ghcr.io/xuehua123/sub2api-lobehub-gateway

jobs:
  docker:
    if: github.ref_type == 'tag' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=false

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  gateway-docker:
    if: github.ref_type == 'tag' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GATEWAY_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=false

      - name: Build and push LobeHub gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./gateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-shanghai:
    runs-on: ubuntu-latest
    needs: [docker, gateway-docker]
    if: github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch
    steps:
      - name: Deploy to Shanghai
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          RESIN_PROXY_URL: ${{ secrets.RESIN_PROXY_URL }}
          DOCKER_NO_PROXY: ${{ secrets.DOCKER_NO_PROXY || '127.0.0.1,localhost,postgres,redis' }}
        with:
          host: ${{ secrets.SH_PROD_HOST || '119.45.125.174' }}
          username: ${{ secrets.SH_PROD_USER || 'ubuntu' }}
          key: ${{ secrets.SHANGHAI_DEPLOY_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SH_PROD_PASSWORD }}
          port: ${{ secrets.SH_PROD_PORT || '22' }}
          envs: IMAGE_NAME,GITHUB_SHA,GHCR_TOKEN,GHCR_USERNAME,RESIN_PROXY_URL,DOCKER_NO_PROXY
          script_stop: true
          command_timeout: 10m
          script: |
            set -eu
            cd /srv/sub2api

            short_sha="$(printf '%.7s' "$GITHUB_SHA")"
            image_tag="sha-${short_sha}"
            deploy_image="${IMAGE_NAME}:${image_tag}"
            backup="compose.yml.bak-$(date +%Y%m%d-%H%M%S)-pre-${image_tag}"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USERNAME:-x-access-token}" --password-stdin
            fi

            if [ -n "${RESIN_PROXY_URL:-}" ]; then
              export HTTP_PROXY="$RESIN_PROXY_URL"
              export HTTPS_PROXY="$RESIN_PROXY_URL"
              export http_proxy="$RESIN_PROXY_URL"
              export https_proxy="$RESIN_PROXY_URL"
              export NO_PROXY="$DOCKER_NO_PROXY"
              export no_proxy="$DOCKER_NO_PROXY"
            fi

            cp compose.yml "$backup"
            DEPLOY_IMAGE="$deploy_image" python3 - <<'PY'
            from pathlib import Path
            import os

            path = Path("compose.yml")
            deploy_image = os.environ["DEPLOY_IMAGE"]
            lines = path.read_text().splitlines()

            for index, line in enumerate(lines):
                stripped = line.lstrip()
                if stripped.startswith("image: ghcr.io/xuehua123/sub2api"):
                    indent = line[: len(line) - len(stripped)]
                    lines[index] = f"{indent}image: {deploy_image}"
                    break
            else:
                raise SystemExit("compose image line not found")

            path.write_text("\n".join(lines) + "\n")
            PY

            chmod +x ./update.sh
            ./update.sh

            docker compose ps
            docker image prune -f
