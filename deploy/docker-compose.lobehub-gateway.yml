services:
  lobehub-gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: lobehub-gateway
    restart: unless-stopped
    ports:
      - "${LOBEHUB_GATEWAY_BIND_HOST:-0.0.0.0}:${LOBEHUB_GATEWAY_PORT:-8090}:8080"
    environment:
      - LISTEN_ADDR=:8080
      - LOBEHUB_UPSTREAM_URL=${LOBEHUB_UPSTREAM_URL:-http://lobehub:3210}
      - SUB2API_API_BASE_URL=${LOBEHUB_SUB2API_API_BASE_URL:?LOBEHUB_SUB2API_API_BASE_URL is required}
      - SUB2API_FRONTEND_URL=${LOBEHUB_SUB2API_FRONTEND_URL:?LOBEHUB_SUB2API_FRONTEND_URL is required}
      - LOBEHUB_PROVIDER_ID=${LOBEHUB_PROVIDER_ID:-generic-oidc}
      - LOBEHUB_BOOTSTRAP_PATH=${LOBEHUB_BOOTSTRAP_PATH:-/__lobehub_bootstrap}
      - LOBEHUB_USER_STATE_PATH=${LOBEHUB_USER_STATE_PATH:-/trpc/lambda/user.getUserState}
      - PUBLIC_SETTINGS_CACHE_TTL=${LOBEHUB_PUBLIC_SETTINGS_CACHE_TTL:-30s}
    networks:
      - sub2api-network

  # Bring your own official LobeHub service. Example only:
  # lobehub:
  #   image: lobehub/lobehub:latest
  #   restart: unless-stopped
  #   environment:
  #     - APP_URL=https://chat.example.com
  #     - NEXT_PUBLIC_AUTH_URL=https://chat.example.com
  #     - AUTH_SECRET=replace-with-random-secret
  #     - AUTH_SSO_PROVIDERS=generic-oidc
  #     - AUTH_GENERIC_OIDC_ID=${LOBEHUB_PROVIDER_ID:-generic-oidc}
  #     - AUTH_GENERIC_OIDC_SECRET=replace-with-sub2api-client-secret
  #     - AUTH_GENERIC_OIDC_ISSUER=https://api.example.com/api/v1/lobehub/oidc
  #     - AUTH_DISABLE_EMAIL_PASSWORD=1
  #   networks:
  #     - sub2api-network
